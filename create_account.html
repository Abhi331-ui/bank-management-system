<!DOCTYPE html>

    <meta charset="UTF-8">
    <script>
        (function() {
            const storedTheme = localStorage.getItem("theme");
            const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            if (storedTheme === "dark" || (!storedTheme && systemPrefersDark)) {
                document.documentElement.classList.add("dark");
                document.documentElement.classList.remove("light");
            } else {
                document.documentElement.classList.remove("dark");
                document.documentElement.classList.add("light");
            }
        })();
    </script>

    <script>
        // Session Info check
        let currentUser = null;
        function checkSession() {
            const session = localStorage.getItem("nexbank_current_user");
            if (session) {
                currentUser = JSON.parse(session);
            }
        }
        checkSession();

        function logoutUser() {
            localStorage.removeItem("nexbank_current_user");
            window.location.href = "login.html";
        }

        // Account Type Select State
        let selectedType = 'Savings';

        function selectType(element) {
            selectedType = element.getAttribute('data-type');
            // Reset all buttons
            document.querySelectorAll('.account-type-btn').forEach(btn => {
                btn.classList.remove('border-primary', 'bg-surface-container-low', 'text-primary');
                btn.classList.add('border-outline-variant', 'text-on-surface-variant');
                btn.querySelector('span.material-symbols-outlined').style.fontVariationSettings = "'FILL' 0";
            });
            
            // Highlight selected
            element.classList.remove('border-outline-variant', 'text-on-surface-variant');
            element.classList.add('border-primary', 'bg-surface-container-low', 'text-primary');
            element.querySelector('span.material-symbols-outlined').style.fontVariationSettings = "'FILL' 1";
        }

        // Form Submit Handler
        function submitCreateAccount(event) {
            event.preventDefault();
            
            const errorEl = document.getElementById("registerError");
            errorEl.classList.add("hidden");

            const holderName = document.getElementById("holderName").value.trim();
            const depositVal = parseFloat(document.getElementById("deposit").value);
            const pinVal = document.getElementById("pin").value.trim();
            const confirmPinVal = document.getElementById("confirmPin").value.trim();

            // PIN Val check
            if (pinVal !== confirmPinVal) {
                errorEl.textContent = "PIN confirmation does not match Set PIN.";
                errorEl.classList.remove("hidden");
                return;
            }

            const pinNum = parseInt(pinVal);
            if (isNaN(pinNum) || pinVal.length !== 6) {
                errorEl.textContent = "PIN must be a numeric value containing exactly 6 digits.";
                errorEl.classList.remove("hidden");
                return;
            }

            if (isNaN(depositVal) || depositVal < 0) {
                errorEl.textContent = "Deposit amount cannot be negative.";
                errorEl.classList.remove("hidden");
                return;
            }

            // Generate unique account number
            const accounts = JSON.parse(localStorage.getItem("nexbank_accounts") || "[]");
            let newAccNo = 1003;
            if (accounts.length > 0) {
                const maxAccNo = Math.max(...accounts.map(a => a.account_number));
                newAccNo = maxAccNo + 1;
            }

            // Create account profile
            const newAcc = { 
                account_number: newAccNo, 
                name: holderName, 
                balance: depositVal, 
                PIN: pinNum,
                type: selectedType 
            };
            accounts.push(newAcc);
            localStorage.setItem("nexbank_accounts", JSON.stringify(accounts));

            // Log Transaction if there is initial balance
            if (depositVal > 0) {
                const logs = JSON.parse(localStorage.getItem("nexbank_transactions") || "[]");
                const now = new Date();
                const dateStr = now.toDateString() + " " + now.toTimeString().split(' ')[0] + " " + now.getFullYear();
                const logEntry = `AccNo: ${newAccNo} | DEPOSIT (Initial Funding) | Amount: ${depositVal.toFixed(2)} | Time: ${dateStr}`;
                logs.push(logEntry);
                localStorage.setItem("nexbank_transactions", JSON.stringify(logs));
            }

            // Set current session
            localStorage.setItem("nexbank_current_user", JSON.stringify(newAcc));

            // Trigger welcome notifications
            const welcomeKey = `nexbank_notifications_${newAccNo}`;
            const notifications = [
                {
                    id: 1,
                    title: "Welcome to NexBank",
                    message: `Institutional ${selectedType} portfolio established with Account Number: ${newAccNo}.`,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    read: false
                }
            ];
            if (depositVal > 0) {
                notifications.unshift({
                    id: 2,
                    title: "Initial Deposit Confirmed",
                    message: `Initial funding of $${depositVal.toFixed(2)} credited successfully.`,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    read: false
                });
            }
            localStorage.setItem(welcomeKey, JSON.stringify(notifications));
            localStorage.setItem(`nexbank_notif_welcome_${newAccNo}`, "true");

            // Show Success Overlay
            const overlay = document.getElementById('successOverlay');
            const progress = document.getElementById('progressBar');
            const successMsg = document.getElementById('successMsg');

            successMsg.innerHTML = `Your wealth container has been established with Account Number: <strong>${newAccNo}</strong>. Redirecting to your dashboard.`;
            overlay.classList.remove('hidden');
            setTimeout(() => {
                progress.style.width = '100%';
            }, 100);

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 2200);
        }

        // Initialize UI Elements
        function initUI() {
            const navEl = document.getElementById("sidebarNav");
            const avatarBadge = document.getElementById("avatarBadge");
            const sidebarUser = document.getElementById("sidebarUser");
            const sidebarAccNo = document.getElementById("sidebarAccNo");
            const backLink = document.getElementById("backLink");
            const headerBtn = document.getElementById("headerBtn");

            if (currentUser) {
                // Logged in rendering
                sidebarUser.textContent = currentUser.name;
                sidebarAccNo.textContent = `Acc No: ${currentUser.account_number}`;
                avatarBadge.textContent = currentUser.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                
                navEl.innerHTML = `
                    <a href="dashboard.html" class="flex items-center gap-md px-md py-sm transition-all duration-150 ease-out text-on-surface-variant hover:text-on-surface hover:bg-surface-container rounded">
                        <span class="material-symbols-outlined">dashboard</span>
                        <span class="font-body-md text-body-md">Dashboard</span>
                    </a>
                    <a href="transfer.html" class="flex items-center gap-md px-md py-sm transition-all duration-150 ease-out text-on-surface-variant hover:text-on-surface hover:bg-surface-container rounded">
                        <span class="material-symbols-outlined">swap_horiz</span>
                        <span class="font-body-md text-body-md">Transfer Fund</span>
                    </a>
                    <a href="#" class="flex items-center gap-md px-md py-sm transition-all duration-150 ease-out bg-surface-tint/10 text-primary font-bold border-r-2 border-primary rounded">
                        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">contactless</span>
                        <span class="font-body-md text-body-md">Open New Account</span>
                    </a>
